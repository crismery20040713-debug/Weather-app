<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="weather-card p-4 rounded-4 shadow-lg text-center position-relative">
            <div class="input-group mb-4">
                <input type="text" id="cityInput" class="form-control bg-transparent text-light border-info" placeholder="Busca una ciudad...">
                <button class="btn btn-outline-info" id="searchBtn">🔍</button>
            </div>

            <div id="weatherContent" class="d-none">
                <h2 id="cityName" class="display-5 fw-bold text-info">---</h2>
                <img id="weatherIcon" src="" alt="Icono clima" class="weather-icon">
                <h1 id="temp" class="display-1 fw-bold">0°C</h1>
                <p id="description" class="lead text-capitalize">---</p>
                
                <div class="row mt-4">
                    <div class="col-6 border-end border-info">
                        <small class="text-info">Humedad</small>
                        <p id="humidity" class="h4">0%</p>
                    </div>
                    <div class="col-6">
                        <small class="text-info">Viento</small>
                        <p id="wind" class="h4">0 km/h</p>
                    </div>
                </div>
                <button id="closeBtn" class="btn btn-sm btn-danger mt-4 opacity-50">Cerrar</button>
            </div>
            
            <div id="loader" class="text-info d-none">Cargando...</div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
